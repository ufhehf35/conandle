<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detective Conan-Dle</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="game-container">
        <h1>Detective Conan-Dle</h1>

        <div id="resultArea" class="hidden">
            <h2 id="resultStatus"></h2>
            <div class="target-reveal">
                <img id="targetImg" src="" alt="">
                <p id="targetName"></p>
            </div>
            <button onclick="location.reload()" class="play-again">Play Again</button>
        </div>

        <div class="search-box">
            <input type="text" id="charInput" placeholder="Type character name..." autocomplete="off">
            <button id="giveUpBtn">Give Up</button>
            <div id="suggestions"></div>
        </div>

        <div id="gameTable">
            <div class="row header">
                <span>Pic</span><span>Gen</span><span>Age</span><span>Height</span><span>Arc</span><span>Origin</span><span>Alias</span>
            </div>
            <div id="guesses"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
