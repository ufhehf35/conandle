<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detective Conan-Dle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>Detective Conan-Dle</h1>
        <div class="search-box">
            <input type="text" id="charInput" placeholder="Type character name...">
            <div id="suggestions"></div>
        </div>
        <div id="gameTable">
            <div class="row header">
                <span>Char</span><span>Gen</span><span>Age</span><span>Height</span><span>Arc</span><span>Origin</span><span>Alias</span>
            </div>
            <div id="guesses"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
